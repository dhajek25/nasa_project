{% extends "base.html" %}
{% block title %}Date input {% endblock %}
{% block content %}
<h2>Date input</h2>
<h3>Write date in format YYYY-MM-DD</h3>
<form method="post">
    <table>
        <form action="take">
        date1 : <input type="text" name="date1"><br>
        date2 : <input type="text" name="date2"><br>
            </form>
    </table>
    {% csrf_token %}
    <button type="submit">Submit</button>
</form>
{% endblock %}
